// ============================================================
// DayZ Server Configuration
// Reference: https://community.bistudio.com/wiki/DayZ:Server_Configuration
// ============================================================

// ----------------------------
// Server Identity And Access
// ----------------------------
hostname = "Adog";              // Public server name shown in the launcher.
description = "";                      // Server browser description. Keep it short and readable.
password = "";                         // Server join password. Leave blank for public access.
passwordAdmin = "";                    // In-game admin password.

enableWhitelist = 0;                    // 1 requires players to be listed in whitelist.txt.
disableBanlist = 0;                     // 1 ignores ban.txt.
disablePrioritylist = 0;                // 1 ignores priority.txt login queue priority.

// ----------------------------
// Player Limits And Security
// ----------------------------
maxPlayers = 60;                        // Maximum player slots.
verifySignatures = 2;                   // Verifies client mod signatures. DayZ supports value 2.
forceSameBuild = 1;                     // 1 requires clients to match the server build.

// ----------------------------
// Voice And View Rules
// ----------------------------
disableVoN = 0;                         // 1 disables in-game voice chat.
vonCodecQuality = 20;                   // Voice quality from 0-20. Higher is clearer.

disable3rdPerson = 0;                   // 1 forces first-person only.
disableCrosshair = 0;                   // 1 hides the crosshair.

// ----------------------------
// Time
// ----------------------------
serverTime = "SystemTime";             // SystemTime uses the Windows clock. You can also use YYYY/MM/DD/HH/MM.
serverTimeAcceleration = 12;            // Day speed multiplier. 1 is real time.
serverNightTimeAcceleration = 1;        // Night multiplier, also affected by serverTimeAcceleration.
serverTimePersistent = 0;               // 1 saves and resumes the in-game time after restart.

// ----------------------------
// Login Queue And Storage
// ----------------------------
guaranteedUpdates = 1;                  // Required server communication mode. Keep this at 1.
loginQueueConcurrentPlayers = 5;        // Players processed through login at the same time.
loginQueueMaxPlayers = 500;             // Maximum players allowed to wait in login queue.

instanceId = 1;                         // Unique storage instance number for this server.
storageAutoFix = 1;                     // 1 attempts to repair broken persistence storage.
shardId = "dzm001";                   // Private shard identifier. Use a unique value per hive/group.

// ----------------------------
// Steam Browser And Launchers
// ----------------------------
steamQueryPort = 27016;                 // Steam query port used by the game browser and launchers.
steamProtocolMaxDataSize = 4096;        // Helps heavily modded servers send larger mod lists to launchers.

// ----------------------------
// Visibility And Lighting
// ----------------------------
defaultVisibility = 1375;               // Server-side terrain view distance cap.
defaultObjectViewDistance = 1375;       // Server-side object view distance cap.
lightingConfig = 0;                     // 0 brighter nights, 1 darker nights, 2 Sakhal lighting.
disablePersonalLight = 1;               // 1 disables the personal night light.

// ----------------------------
// Gameplay Rules
// ----------------------------
disableBaseDamage = 0;                  // 1 disables damage to fences and watchtowers.
disableContainerDamage = 0;             // 1 disables damage to tents, barrels, crates, and sea chests.
disableRespawnDialog = 0;               // 1 skips respawn selection and uses random respawns.
enableCfgGameplayFile = 1;              // 1 enables cfggameplay.json support for extra gameplay settings.
storeHouseStateDisabled = 0;            // 1 stops storage of house door/window state.
enableDebugMonitor = 0;                 // 1 shows the player debug monitor in-game.

// ----------------------------
// Performance And Diagnostics
// ----------------------------
multithreadedReplication = 1;           // 1 enables multi-threaded server replication.

// Optional examples. Uncomment only if you know you want these.
// respawnTime = 5;                    // Respawn delay in seconds after death.
// motd[] = { "Welcome to the server" };
// motdInterval = 30;                  // Seconds between message-of-the-day lines.
// timeStampFormat = "Short";         // RPT timestamp style: Short or Full.
// logAverageFps = 60;                 // Log average FPS every X seconds when -doLogs is enabled.
// logMemory = 60;                     // Log memory use every X seconds when -doLogs is enabled.
// logPlayers = 60;                    // Log player count every X seconds when -doLogs is enabled.
// adminLogPlayerHitsOnly = 0;         // 1 logs only player hits in admin log.
// adminLogPlacement = 0;              // 1 logs placement actions.
// adminLogBuildActions = 0;           // 1 logs build/dismantle/destroy actions.
// adminLogPlayerList = 0;             // 1 logs player list with positions every 5 minutes.
// pingWarning = 200;                  // Yellow ping warning threshold in milliseconds.
// pingCritical = 250;                 // Red ping warning threshold in milliseconds.
// MaxPing = 300;                      // Kick threshold for high ping.
// serverFpsWarning = 15;              // Server FPS warning threshold.

// ----------------------------
// Mission
// ----------------------------
class Missions
{
    class DayZ
    {
        template="dayzOffline.MichiganSurvival"; // MissionName.TerrainName
    };
};
